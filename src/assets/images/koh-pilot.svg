<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#000;stop-opacity:1' />
      <stop offset='50%' style='stop-color:#202020;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#404040;stop-opacity:1' />
    </linearGradient>
    <radialGradient id='sparkle' cx='50%' cy='50%' r='50%'>
      <stop offset='0%' style='stop-color:#ffd700;stop-opacity:1' />
      <stop offset='50%' style='stop-color:#ffed4e;stop-opacity:0.8' />
      <stop offset='100%' style='stop-color:#ff6b6b;stop-opacity:0.6' />
    </radialGradient>
  </defs>
  <rect width='512' height='512' fill='url(#bg)' rx='80'/>
  <circle cx='256' cy='256' r='180' fill='none' stroke='#10b981' stroke-width='8' stroke-dasharray='565.48' stroke-dashoffset='113.1'/>
  <text x='256' y='280' font-family='Arial, sans-serif' font-size='120' text-anchor='middle' fill='#ffd700'>🎉</text>
  <circle cx='120' cy='120' r='4' fill='url(#sparkle)' opacity='0.8'>
    <animate attributeName='opacity' values='0.8;0.2;0.8' dur='2s' repeatCount='indefinite'/>
  </circle>
  <circle cx='392' cy='120' r='3' fill='url(#sparkle)' opacity='0.6'>
    <animate attributeName='opacity' values='0.6;0.1;0.6' dur='1.5s' repeatCount='indefinite'/>
  </circle>
  <circle cx='120' cy='392' r='3' fill='url(#sparkle)' opacity='0.7'>
    <animate attributeName='opacity' values='0.7;0.15;0.7' dur='1.8s' repeatCount='indefinite'/>
  </circle>
  <circle cx='392' cy='392' r='4' fill='url(#sparkle)' opacity='0.9'>
    <animate attributeName='opacity' values='0.9;0.3;0.9' dur='2.2s' repeatCount='indefinite'/>
  </circle>
</svg>
